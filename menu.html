<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0f1e">
  <title>RPAS — 9º BPM | Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0f1e;
      --panel: #111827;
      --border: rgba(30,144,255,0.2);
      --blue: #1e90ff;
      --blue-dim: rgba(30,144,255,0.12);
      --accent: #00d4ff;
      --green: #00e676;
      --red: #ff5252;
      --gold: #ffd700;
      --text: #e8eaf0;
      --text-dim: #8892a4;
      --font-head: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --font-body: 'Exo 2', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Grade de fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,144,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,144,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Topo */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(11,16,30,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pm-badge {
      width: 40px;
      height: 40px;
      background: var(--blue-dim);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .pm-info .nome {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
    }

    .pm-info .sub {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .topbar-right {
      text-align: right;
      font-family: var(--font-mono);
    }

    .topbar-right .hora {
      font-size: 18px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .topbar-right .data {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Conteúdo central */
    .main {
      flex: 1;
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero-icon {
      font-size: 64px;
      filter: drop-shadow(0 0 30px var(--blue));
      animation: hover-drone 3s ease-in-out infinite;
      display: block;
      margin-bottom: 16px;
    }

    @keyframes hover-drone {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-10px) rotate(2deg); }
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--text);
      text-transform: uppercase;
      line-height: 1;
    }

    .hero-title .hl { color: var(--blue); }

    .hero-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* Cards de ação */
    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 560px;
    }

    .action-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: block;
    }

    .action-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-color);
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .action-card:hover::before { transform: scaleX(1); }

    .action-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--card-color);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--card-color);
    }

    .action-card.entrada { --card-color: var(--green); }
    .action-card.saida   { --card-color: var(--red); }
    .action-card.admin   { --card-color: var(--gold); }
    .action-card.relatorio { --card-color: var(--accent); }

    .card-icon {
      font-size: 40px;
      margin-bottom: 14px;
      display: block;
      filter: drop-shadow(0 0 12px var(--card-color));
    }

    .card-title-text {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--card-color);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      letter-spacing: 1px;
    }

    /* Status bar inferior */
    .status-bar {
      position: relative;
      z-index: 10;
      background: rgba(11,16,30,0.95);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .alerta-badge {
      background: rgba(255,82,82,0.15);
      border: 1px solid rgba(255,82,82,0.3);
      color: var(--red);
      border-radius: 20px;
      padding: 2px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      display: none;
      align-items: center;
      gap: 4px;
    }

    .alerta-badge.visivel { display: flex; }

    /* Responsivo mobile */
    @media (max-width: 480px) {
      .actions-grid {
        grid-template-columns: 1fr;
        max-width: 300px;
      }
      .hero-title { font-size: 36px; letter-spacing: 5px; }
      .hero-icon { font-size: 52px; }
      .action-card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="pm-badge">🚁</div>
    <div class="pm-info">
      <div class="nome">9º BPM</div>
      <div class="sub">SEÇÃO DE PATRIMÔNIO · P4</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="hora" id="hora">--:--:--</div>
    <div class="data" id="data">--/--/----</div>
  </div>
</div>

<!-- Conteúdo -->
<div class="main">
  <div class="hero">
    <span class="hero-icon">🚁</span>
    <div class="hero-title">R<span class="hl">P</span>AS</div>
    <div class="hero-sub">Sistema de Controle de Aeronaves Remotamente Tripuladas</div>
  </div>

  <div class="actions-grid">
    <a href="entrada.html" class="action-card entrada">
      <span class="card-icon">✅</span>
      <div class="card-title-text">ENTRADA</div>
      <div class="card-desc">Checklist Pré-Voo</div>
    </a>

    <a href="saida.html" class="action-card saida">
      <span class="card-icon">🛬</span>
      <div class="card-title-text">SAÍDA</div>
      <div class="card-desc">Checklist Pós-Voo</div>
    </a>

    <a href="admin.html" class="action-card admin">
      <span class="card-icon">⚙️</span>
      <div class="card-title-text">ADMIN</div>
      <div class="card-desc">Painel de Controle</div>
    </a>

    <a href="admin.html#alertas" class="action-card relatorio">
      <span class="card-icon">🔋</span>
      <div class="card-title-text">BATERIAS</div>
      <div class="card-desc">Ciclos & Alertas</div>
    </a>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-item">
    <div class="status-dot"></div>
    SISTEMA ONLINE
  </div>

  <div class="alerta-badge" id="alertaBaterias">
    <i class="fas fa-battery-quarter"></i>
    <span id="qtdAlertas">0</span> bateria(s) em alerta
  </div>

  <div class="status-item" id="statusVoo">
    <i class="fas fa-satellite-dish" style="color:var(--accent);"></i>
    Verificando aeronaves...
  </div>
</div>

<script src="config.js"></script>
<script>
  const API_URL = RPAS_CONFIG.API_URL;

  // Relógio
  function tick() {
    const now = new Date();
    document.getElementById('hora').textContent =
      now.toLocaleTimeString('pt-BR');
    document.getElementById('data').textContent =
      now.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
  }
  setInterval(tick, 1000);
  tick();

  // Verifica status geral
  async function verificarStatus() {
    try {
      const resp = await fetch(`${API_URL}?action=getStatusGeral`);
      const json = await resp.json();
      if (!json.ok) return;

      const d = json.data;

      // Aeronaves em voo
      const statusEl = document.getElementById('statusVoo');
      if (d.aeronavesEmVoo && d.aeronavesEmVoo.length > 0) {
        statusEl.innerHTML = `<i class="fas fa-plane" style="color:var(--green);"></i> ${d.aeronavesEmVoo.length} aeronave(s) em voo`;
      } else {
        statusEl.innerHTML = `<i class="fas fa-parking" style="color:var(--text-dim);"></i> Nenhuma aeronave em voo`;
      }

      // Alertas de bateria
      if (d.alertas && d.alertas.length > 0) {
        const badge = document.getElementById('alertaBaterias');
        document.getElementById('qtdAlertas').textContent = d.alertas.length;
        badge.classList.add('visivel');
      }
    } catch (e) {
      console.warn('Status não disponível:', e);
    }
  }

  verificarStatus();
  setInterval(verificarStatus, 60000); // Atualiza a cada minuto
</script>
</body>
</html>
